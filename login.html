<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* 🌤 Light orange background */
      background: linear-gradient(135deg, #ffe5cc, #ffffff);
    }

    .login-box {
      width: 320px;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      text-align: center;
      border-top: 5px solid #ffa500;
    }

    .login-box h2 {
      color: #ff8c00;
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    .login-box input:focus {
      border-color: #ffa500;
    }

    /* 🔥 Highlight Button */
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #ffa500;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(255,165,0,0.35);
    }

    .login-box button:hover {
      background: #ff8c00;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(255,140,0,0.5);
    }

    .login-box button:active {
      transform: scale(0.97);
    }

    .note {
      font-size: 12px;
      color: gray;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="note">Demo: admin / 1234</div>
  </div>

  <script src="script.js"></script>

</body>
</html>
