<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrafficVerse Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fff, #ffe5cc);
}

.container {
  width: 360px;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
}

.logo {
  font-size: 26px;
  font-weight: bold;
  color: #ff7a00;
}

.tagline {
  font-size: 12px;
  color: gray;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 2px solid #ddd;
  border-radius: 8px;
  outline: none;
}

input:focus {
  border-color: #ff7a00;
  box-shadow: 0 0 8px rgba(255,122,0,0.3);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #ff7a00, #ff9a3c);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.error {
  color: red;
  font-size: 13px;
  display: none;
  margin-top: 10px;
}

.success {
  color: green;
  font-size: 13px;
  display: none;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

  <div class="logo">🚦 TrafficVerse</div>
  <div class="tagline">Authorized Access Only</div>

  <!-- ONLY AUTH LOGIN -->
  <input type="email" id="email" placeholder="Authorized Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Authorize User</button>

  <div class="error" id="error">❌ Access Denied</div>
  <div class="success" id="success">✅ Access Granted</div>

</div>

<script>
const AUTH_EMAIL = "admin@trafficverse.com";
const AUTH_PASS = "1234";

function login() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  let error = document.getElementById("error");
  let success = document.getElementById("success");

  error.style.display = "none";
  success.style.display = "none";

  if (email === AUTH_EMAIL && pass === AUTH_PASS) {
    success.style.display = "block";

    setTimeout(() => {
      alert("Access Granted → Redirecting to Dashboard");
    }, 800);

  } else {
    error.style.display = "block";
  }
}
</script>

</body>
</html>
